appId: host.exp.exponent
---
- runFlow: seed-data.yaml
# Open Log Session via FAB
- tapOn:
    point: "50%,95%"
- waitForAnimationToEnd
- assertVisible: "Log a Session"
# Tap the Add partner button (dashed circle with +)
- tapOn: "Add"
- waitForAnimationToEnd
- assertVisible: "New Partner"
# Type partner name
- inputText: "Sam"
# Tap Save
- tapOn: "SAVE"
- waitForAnimationToEnd
