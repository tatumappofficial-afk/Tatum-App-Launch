appId: host.exp.exponent
---
- runFlow: seed-data.yaml
# Home screen shows partner cards in the PARTNERS section
# Tap the first partner card (leftmost, around 15-20% x, 52% y)
- tapOn:
    point: "15%,52%"
- waitForAnimationToEnd
# Verify partner profile opened (should show partner name and stats)
- assertVisible:
    text: ".*SESSIONS.*|.*Sessions.*|.*sessions.*"
