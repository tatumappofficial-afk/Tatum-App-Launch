appId: host.exp.exponent
---
- runFlow: seed-data.yaml
# The home screen shows partner cards - tap on the first one (Alex)
# Partner cards are in the middle of the screen, around 30% x, ~52% y
- tapOn:
    point: "20%,52%"
- waitForAnimationToEnd
# Verify we're on partner detail
- assertVisible: "Alex"
