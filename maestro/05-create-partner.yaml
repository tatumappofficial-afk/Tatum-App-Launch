appId: com.skylightsocial.tatum
---
- launchApp
- tapOn: "CALENDAR"
- tapOn:
    text: "TAP TO DISMISS"
    optional: true
# Use the FAB (center tab) to open Quick Log regardless of existing encounters
- tapOn: "✦"
- tapOn: "ADD"
- assertVisible: "New Partner"
- tapOn: "Nickname or initials"
- inputText: "James"
- tapOn: "SAVE"
